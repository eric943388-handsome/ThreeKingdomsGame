<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>三國養成遊戲</title>
  <style>
    body {
      font-family: "微軟正黑體", sans-serif;
      text-align: center;
      padding: 20px;
    }
    .container {
      margin: 20px 0;
    }
    button {
      margin: 5px;
      padding: 10px 20px;
      font-size: 16px;
    }
    #log {
      margin-top: 20px;
      font-size: 18px;
      min-height: 24px;
    }
  </style>
</head>
<body>

<h1>⚔️ 我的三國 ⚔️</h1>

<div class="container">
  <button onclick="develop()">發展</button>
  <button onclick="recruit()">招募</button>
  <button onclick="expand()">擴張</button>
  <button onclick="train()">鍛鍊</button>
  <button onclick="equip()">裝備</button>
</div>

<p id="log">歡迎來到三國世界！</p>

<script>
function develop() {
  document.getElementById("log").innerText = "你進行了發展，資源增加！";
}

function recruit() {
  document.getElementById("log").innerText = "你招募了一名武將！";
}

function expand() {
  document.getElementById("log").innerText = "你發動了戰爭！";
}

function train() {
  document.getElementById("log").innerText = "武將正在鍛鍊！";
}

function equip() {
  document.getElementById("log").innerText = "裝備已強化！";
}
</script>

</body>
</html>
