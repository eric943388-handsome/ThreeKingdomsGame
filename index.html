<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>三國養成遊戲</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>⚔️ 我的三國 ⚔️</h1>

  <!-- 玩家狀態 -->
  <div id="stats"></div>
  <p id="log"></p>

  <!-- 頁籤 -->
  <div id="navbar">
    <button class="tab-btn" data-target="developPage">發展</button>
    <button class="tab-btn" data-target="recruitPage">招募</button>
    <button class="tab-btn" data-target="warPage">攻打</button>
    <button class="tab-btn" data-target="generalsPage">武將</button>
    <button class="tab-btn" data-target="storePage">商店</button>
  </div>

  <!-- 各頁面區塊 -->
  <div id="pages">
    <!-- 發展 -->
    <div id="developPage" class="page">
      <div class="page-content">
        <button id="btnDevelopAtk">發展兵力</button>
        <button id="btnDevelopDef">發展國防</button>
      </div>
    </div>

    <!-- 招募 -->
    <div id="recruitPage" class="page">
      <div class="page-content">
        <button id="btnRecruit">普通招募（錢）</button>
      <button id="btnEliteRecruit">💎高級招募（卷）</button>
        <p id="eliteScrollCount">高級武將卷: 0</p> <!-- 顯示卷數 -->
      </div>
    </div>

    <!-- 攻打 -->
    <div id="warPage" class="page">
      <div class="page-content">
        <button id="btnFind">找敵人</button>
        <button id="btnAttack">攻打</button>
        <div id="enemy"></div>
      </div>
    </div>

    <!-- 武將 -->
    <div id="generalsPage" class="page">
      <div class="page-content">
        <div id="items"></div>
        <div id="generalsList"></div>
      </div>
    </div>

<!-- 商店 -->
<div id="storePage" class="page">
  <div class="page-content">
    <button id="btnBuyFood">購買糧食（+50）💰30</button>
    <button id="btnBuyStone">購買石頭（+50）💰30</button>
    <button id="btnBuyHpPack">購買補包 💰50</button>
    <button id="btnBuyLoyaltyPack">購買封侯令 💰80</button>
    <button id="btnBuyExpPack">購買經驗禮包 💰100</button>
  </div>
</div>

  <!-- 勝敗提示彈窗 -->
  <div id="gameOverModal" style="
      display:none;
      position:fixed;
      top:0; left:0; right:0; bottom:0;
      background: rgba(0,0,0,0.5);
      justify-content:center;
      align-items:center;
      z-index:9999;
  ">
    <div style="
        background:#0e0e0e; 
        padding:20px; 
        border-radius:10px; 
        text-align:center;
        min-width:250px;
    ">
      <p id="modalMessage"></p>
      <p id="modalCountdown"></p>
    </div>
  </div>

  <script type="module" src="main.js"></script>
</body>
</html>
