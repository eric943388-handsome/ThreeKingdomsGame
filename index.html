<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>三國養成遊戲</title>

<style>
body {
  margin: 0;
  font-family: "微軟正黑體", sans-serif;
  background: #1e1e2f;
  color: white;
  text-align: center;
}

h1 {
  margin: 20px;
}

#stats {
  background: #2c2c3e;
  padding: 15px;
  margin: 10px auto;
  width: 85%;
  border-radius: 10px;
  font-size: 18px;
}

.container {
  margin-top: 15px;
}

button {
  margin: 5px;
  padding: 12px 18px;
  font-size: 15px;
  border-radius: 10px;
  border: none;
  background: #3a3a5a;
  color: white;
  cursor: pointer;
}

button:hover {
  background: #4a4a7a;
}

.box {
  margin: 15px auto;
  padding: 10px;
  width: 85%;
  background: #2a2a45;
  border-radius: 10px;
}

#generalsList div {
  padding: 5px;
  border-bottom: 1px solid #444;
}

#log {
  margin-top: 15px;
  color: gold;
}
</style>
</head>

<body>

<h1>⚔️ 我的三國 ⚔️</h1>

<div id="stats"></div>

<div class="container">
  <button onclick="developAtk()">發展兵力</button>
  <button onclick="developDef()">發展國防</button>
  <button onclick="recruit()">招募（抽卡）</button>
  <button onclick="findEnemy()">找敵人</button>
  <button onclick="attackEnemy()">攻打</button>
  <button onclick="train()">鍛鍊</button>
</div>

<div class="box">
  <h3>🏪 商店</h3>
  <button onclick="buyFood()">購買糧食（+50）💰30</button>
  <button onclick="buyStone()">購買石頭（+50）💰30</button>
</div>

<div class="box">
  <h3>敵人</h3>
  <div id="enemy"></div>
</div>

<div class="box">
  <h3>武將</h3>
  <div id="generalsList"></div>
</div>

<p id="log"></p>

<script>
// ===== 玩家數值 =====
let gold = 200;
let food = 100;
let stone = 100;
let attack = 20;
let defense = 10;
let generals = [];
let currentEnemy = null;

// ===== 武將池 =====
const generalPool = [
  { name: "關羽", atk: 10, def: 5 },
  { name: "張飛", atk: 12, def: 3 }
];

// ===== UI =====
function updateUI(msg="") {
  document.getElementById("stats").innerText =
    `💰${gold} 🌾${food} 🪨${stone} ⚔️${attack} 🛡${defense} 👥${generals.length}`;

  document.getElementById("log").innerText = msg;
  renderGenerals();
}

// ===== 武將顯示 =====
function renderGenerals() {
  let list = document.getElementById("generalsList");
  list.innerHTML = "";

  generals.forEach((g) => {
    let div = document.createElement("div");
    div.innerText = `${g.name} ⚔️${g.atk} 🛡${g.def}`;
    list.appendChild(div);
  });
}

// ===== 發展 =====
function developAtk() {
  if (food < 20) {
    updateUI("糧食不足！");
    return;
  }
  food -= 20;
  attack += 5;
  updateUI("兵力提升！");
}

function developDef() {
  if (stone < 20) {
    updateUI("石頭不足！");
    return;
  }
  stone -= 20;
  defense += 5;
  updateUI("國防提升！");
}

// ===== 商店 =====
function buyFood() {
  if (gold < 30) {
    updateUI("金幣不足！");
    return;
  }
  gold -= 30;
  food += 50;
  updateUI("購買糧食成功！");
}

function buyStone() {
  if (gold < 30) {
    updateUI("金幣不足！");
    return;
  }
  gold -= 30;
  stone += 50;
  updateUI("購買石頭成功！");
}

// ===== 抽卡 =====
function recruit() {
  if (gold < 50) {
    updateUI("金幣不足！");
    return;
  }

  gold -= 50;
  let chance = Math.random();

  if (chance < 0.4) {
    let g = generalPool[Math.floor(Math.random() * generalPool.length)];
    generals.push({...g});
    updateUI("🎉 抽到武將：" + g.name);
  } else {
    let reward = Math.floor(Math.random() * 50) + 20;
    gold += reward;
    updateUI("沒抽到武將，獲得金幣：" + reward);
  }
}

// ===== 找敵人 =====
function findEnemy() {
  currentEnemy = {
    atk: Math.floor(Math.random() * 30) + 10,
    def: Math.floor(Math.random() * 30) + 10
  };

  document.getElementById("enemy").innerText =
    `⚔️${currentEnemy.atk} 🛡${currentEnemy.def}`;
}

// ===== 戰鬥 =====
function attackEnemy() {
  if (!currentEnemy) {
    updateUI("請先找敵人！");
    return;
  }

  let totalAtk = attack + generals.reduce((a,g)=>a+g.atk,0);

  if (totalAtk > currentEnemy.def) {
    let reward = 100;
    gold += reward;
    attack -= 5;
    updateUI("勝利！獲得金幣 " + reward);
  } else {
    attack -= 10;
    updateUI("戰敗...");
  }

  currentEnemy = null;
  document.getElementById("enemy").innerText = "";
}

// ===== 鍛鍊 =====
function train() {
  if (generals.length === 0) {
    updateUI("沒有武將！");
    return;
  }

  generals[0].atk += 2;
  generals[0].def += 2;
  updateUI("武將變強了！");
}

// ===== 初始化 =====
updateUI("開始你的三國之旅！");
</script>

</body>
</html>
