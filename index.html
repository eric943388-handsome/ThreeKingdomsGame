<script>
// ===== 玩家數值 =====
let gold = 200;
let attack = 20;
let defense = 10;
let generals = [];
let currentEnemy = null;

// ===== 武將池（你可以自己加）=====
const generalPool = [
  { name: "關羽", atk: 10, def: 5 },
  { name: "張飛", atk: 12, def: 3 }
];

// ===== 更新UI =====
function updateUI(msg="") {
  document.getElementById("stats").innerText =
    `💰${gold} ⚔️${attack} 🛡${defense} 👥${generals.length}`;

  document.getElementById("log").innerText = msg;

  renderGenerals();
}

// ===== 顯示武將 =====
function renderGenerals() {
  let list = document.getElementById("generalsList");
  list.innerHTML = "";

  generals.forEach((g, i) => {
    let div = document.createElement("div");
    div.innerText = `${g.name} ⚔️${g.atk} 🛡${g.def}`;
    list.appendChild(div);
  });
}

// ===== 發展 =====
function developAtk() {
  attack += 5;
  updateUI("兵力提升！");
}

function developDef() {
  defense += 5;
  updateUI("國防提升！");
}

// ===== 招募（抽卡）=====
function recruit() {
  if (gold < 50) {
    updateUI("金幣不足！");
    return;
  }

  gold -= 50;

  let chance = Math.random();

  if (chance < 0.4) { // ⭐ 機率你可以改
    let g = generalPool[Math.floor(Math.random() * generalPool.length)];
    generals.push({...g});
    updateUI("🎉 抽到武將：" + g.name);
  } else {
    let reward = Math.floor(Math.random() * 50) + 20;
    gold += reward;
    updateUI("沒抽到武將，獲得金幣：" + reward);
  }
}

// ===== 找敵人 =====
function findEnemy() {
  currentEnemy = {
    atk: Math.floor(Math.random() * 30) + 10,
    def: Math.floor(Math.random() * 30) + 10
  };

  document.getElementById("enemy").innerText =
    `敵人 ⚔️${currentEnemy.atk} 🛡${currentEnemy.def}`;
}

// ===== 攻擊 =====
function attackEnemy() {
  if (!currentEnemy) return;

  let totalAtk = attack + generals.reduce((a,g)=>a+g.atk,0);
  let totalDef = defense + generals.reduce((a,g)=>a+g.def,0);

  if (totalAtk > currentEnemy.def) {
    let reward = 100;
    gold += reward;
    attack -= 5;
    updateUI("勝利！獲得金幣 " + reward);
  } else {
    attack -= 10;
    updateUI("戰敗！");
  }

  currentEnemy = null;
  document.getElementById("enemy").innerText = "";
}

// ===== 鍛鍊 =====
function train() {
  if (generals.length === 0) {
    updateUI("沒有武將！");
    return;
  }

  generals[0].atk += 2;
  generals[0].def += 2;
  updateUI("武將變強了！");
}

// ===== 初始化 =====
updateUI("開始你的三國之旅！");
</script>
